<!doctype html>
<html lang="pt-BR" translate="no">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- App ja esta em PT-BR. Tradutor automatico mutila o DOM e quebra o React
         (ex.: falha ao mostrar o preview do CSV). Pedimos para NAO traduzir. -->
    <meta name="google" content="notranslate" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Café Saporino Website Development</title>
  </head>
  <body>
    <div id="root" class="notranslate" translate="no"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // PWA/Service Worker DESATIVADO de proposito (causava versao em cache quebrada,
      // ex.: import de CSV/XLSX parava de funcionar). Este script DESREGISTRA qualquer
      // SW antigo e LIMPA os caches a cada carregamento — assim navegadores que ja
      // pegaram o SW antigo se autolimpam sozinhos no proximo acesso.
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function (registrations) {
          for (var i = 0; i < registrations.length; i++) registrations[i].unregister();
        });
        if ('caches' in window) {
          caches.keys().then(function (names) {
            for (var i = 0; i < names.length; i++) caches.delete(names[i]);
          });
        }
      }
    </script>
  </body>
</html>
